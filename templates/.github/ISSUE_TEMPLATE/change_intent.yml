name: Change Intent
description: Define a bounded outcome or decision before execution begins.
title: "[Change]: "
labels: ["state:proposed"]
body:
  - type: textarea
    id: outcome
    attributes:
      label: Outcome or decision
      description: What should become observably true, or which decision should this work enable?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Why it matters
      description: Give the customer, product, business, or technical context. Keep it concrete.
    validations:
      required: true

  - type: textarea
    id: current_state
    attributes:
      label: Current state
      description: Describe the behavior, failure signal, or uncertainty that should change.
    validations:
      required: true

  - type: dropdown
    id: change_type
    attributes:
      label: Change type
      options:
        - bug
        - feature
        - improvement
        - refactor
        - documentation
        - experiment
        - investigation
    validations:
      required: true

  - type: dropdown
    id: resolution_intent
    attributes:
      label: Intended path
      description: Choose "either" when the evidence should determine whether anything lands.
      options:
        - delivery
        - experiment
        - investigation
        - either_based_on_evidence
    validations:
      required: true

  - type: dropdown
    id: landing_expectation
    attributes:
      label: Landing expectation
      options:
        - expected
        - possible
        - not_required
    validations:
      required: true

  - type: textarea
    id: criteria
    attributes:
      label: What would count as success?
      description: State the delivered acceptance criteria and, when relevant, the evidence for a useful non-landed decision.
      placeholder: |
        Delivered:
        - [ ] ...

        Useful non-landed decision:
        - Question or uncertainty:
        - Evidence required:
        - Follow-up or stop action:
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope boundaries
      description: Name non-goals, forbidden surfaces, and likely affected areas.
      placeholder: |
        In scope:
        Out of scope:
        Must not change:
        Likely surfaces:
    validations:
      required: true

  - type: textarea
    id: proof
    attributes:
      label: Validation and evidence
      description: What tests, reproduction, browser proof, logs, traces, research, benchmarks, or specialist judgment are needed?
    validations:
      required: true

  - type: textarea
    id: stop_conditions
    attributes:
      label: Stop conditions
      description: What should force a decision instead of more implementation or spend?

  - type: input
    id: gate_profile
    attributes:
      label: Gate profile
      placeholder: low-risk-ui
    validations:
      required: true

  - type: dropdown
    id: risk
    attributes:
      label: Risk
      options:
        - low
        - medium
        - high
    validations:
      required: true

  - type: input
    id: initiative
    attributes:
      label: Parent initiative
      description: Optional. Add an ID or link when this Change belongs to a larger product bet.
      placeholder: INIT-004

  - type: textarea
    id: resource_posture
    attributes:
      label: Resource posture — optional
      description: Add a likely range, confidence, builder attention, or thresholds only when they will improve a decision.
      placeholder: |
        Forecast stage and range:
        Confidence and comparables:
        Soft checkpoint:
        Hard decision threshold:

  - type: textarea
    id: builder_engagement
    attributes:
      label: Expected builder judgment — optional
      description: Where is product, design, architecture, security, evidence, stop, or release judgment likely to matter?

  - type: textarea
    id: references
    attributes:
      label: References
      description: Customer examples, designs, logs, prior Changes, decisions, or comparable work.
