name: Change Intent
description: Define one bounded product outcome before execution begins.
title: "[Change]: "
labels: ["state:proposed"]
body:
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should become observably true?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Why it matters
      description: Give the customer, product, business, or technical context. Keep it concrete.
    validations:
      required: true

  - type: textarea
    id: current_state
    attributes:
      label: Current state
      description: Describe the behavior, failure signal, or uncertainty that should change.
    validations:
      required: true

  - type: dropdown
    id: change_type
    attributes:
      label: Change type
      options:
        - bug
        - feature
        - improvement
        - refactor
        - documentation
        - experiment
        - investigation
    validations:
      required: true

  - type: textarea
    id: criteria
    attributes:
      label: What would count as success?
      description: State the acceptance criteria in observable terms.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope boundaries
      description: Name non-goals, forbidden surfaces, and likely affected areas.
      placeholder: |
        In scope:
        Out of scope:
        Must not change:
        Likely surfaces:
    validations:
      required: true

  - type: textarea
    id: proof
    attributes:
      label: Validation and evidence
      description: What tests, reproduction, browser proof, logs, traces, research, benchmarks, or specialist judgment are needed?
    validations:
      required: true

  - type: textarea
    id: exploration
    attributes:
      label: Exploration or decision path — optional
      description: Use this when the evidence may correctly lead to no merge.
      placeholder: |
        Decision question:
        Evidence needed:
        What would justify stopping or changing course:
        Useful non-landed outcome:

  - type: textarea
    id: stop_conditions
    attributes:
      label: Stop conditions — optional
      description: What should force a builder decision instead of more implementation?

  - type: input
    id: gate_profile
    attributes:
      label: Gate profile
      placeholder: low-risk-ui
    validations:
      required: true

  - type: dropdown
    id: risk
    attributes:
      label: Risk
      options:
        - low
        - medium
        - high
    validations:
      required: true

  - type: textarea
    id: builder_engagement
    attributes:
      label: Expected builder judgment — optional
      description: Where is product, design, architecture, security, specialist, or release judgment likely to matter?

  - type: input
    id: initiative
    attributes:
      label: Parent initiative — optional
      description: Add an ID or link when this Change belongs to a larger product bet.
      placeholder: INIT-004

  - type: textarea
    id: resource_posture
    attributes:
      label: Resource forecast or thresholds — optional
      description: Add a range, confidence, or checkpoint only when it will improve a decision.
      placeholder: |
        Likely range:
        Confidence and basis:
        Soft checkpoint:
        Hard decision threshold:

  - type: textarea
    id: references
    attributes:
      label: References — optional
      description: Customer examples, designs, logs, prior Changes, decisions, or comparable work.
